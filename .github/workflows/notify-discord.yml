name: Notify Discord on New Link

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Use the push event range for diffing
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep 'gerenciador-bookmarks/src/content/links/.*\.mdx$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=A $BEFORE $AFTER | grep 'gerenciador-bookmarks/src/content/links/.*\.mdx$' || true)
          fi
          
          if [ -z "$FILES" ]; then
            echo "Nenhum novo link adicionado no range de commits."
            exit 0
          fi

          # Use Node.js to parse and send
          FILES="$FILES" node -e "
          const fs = require('fs');

          async function notify() {
            const files = process.env.FILES.split('\n').filter(Boolean);
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;

            for (const file of files) {
              try {
                console.log('--- Processando: ' + file + ' ---');
                if (!fs.existsSync(file)) {
                  console.log('Arquivo não encontrado no disco: ' + file);
                  continue;
                }
                
                const contentFile = fs.readFileSync(file, 'utf8');
                
                const getValue = (key) => {
                  const regex = new RegExp('^' + key + ':\\s*(.*)$', 'm');
                  const match = contentFile.match(regex);
                  if (!match) return null;
                  return match[1].trim().replace(/^[\"']|[\"']$/g, '').trim();
                };

                const name = getValue('name') || 'Sem nome';
                const url = getValue('link') || 'Sem URL';
                const desc = getValue('description') || 'Sem descrição';

                console.log('Dados extraídos:', { name, url });

                const msg = '🆕 **Novo link adicionado em https://links.trincheira.dev/**\n' +
                            name + '\n' +
                            url + '\n' +
                            desc;

                const payload = {
                  username: 'Trincheira Links',
                  avatar_url: 'https://raw.githubusercontent.com/ffmenezes/trincheira-links/master/gerenciador-bookmarks/public/favicon.png',
                  content: msg
                };

                const response = await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                if (response.ok) {
                  console.log('✅ Notificação enviada: ' + name);
                } else {
                  console.error('❌ Erro no Discord: ' + response.status + ' ' + response.statusText);
                  const errorData = await response.text();
                  console.error('Detalhes:', errorData);
                }
              } catch (err) {
                console.error('❌ Erro crítico em ' + file + ':', err);
              }
            }
          }

          notify();
          "
